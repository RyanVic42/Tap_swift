{% extends "base.html" %}

{% block title %}Admin Login - Bus Pass System{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2>🔐 Admin Login</h2>
    <p style="color: #666; margin-bottom: 2rem;">Access the administrative control panel</p>
    
    <form method="POST" id="adminLoginForm">
        <div class="form-group">
            <label for="username">Admin Username:</label>
            <input type="text" name="username" id="username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Admin Password:</label>
            <input type="password" name="password" id="password" required>
        </div>
        
        <button type="submit" class="btn" data-original-text="Login as Admin" style="width: 100%;">
            Login as Admin
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee;">
        <p style="color: #666;">Need admin access?</p>
        <a href="{{ url_for('admin_register') }}" style="color: #667eea; text-decoration: none;">
            Register as Admin →
        </a>
    </div>
    
    <div style="text-align: center; margin-top: 1rem;">
        <a href="{{ url_for('login') }}" style="color: #999; text-decoration: none; font-size: 0.9rem;">
            ← Back to User Login
        </a>
    </div>
</div>
{% endblock %}
