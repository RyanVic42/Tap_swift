{% extends "base.html" %}

{% block title %}Login - Bus Pass System{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2>Login</h2>
    <form method="POST" id="loginForm">
        <div class="form-group">
            <label for="role">Login As:</label>
            <select name="role" id="role" required>
                <option value="">Select Role</option>
                <option value="passenger">Passenger</option>
                <option value="driver">Driver</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required>
        </div>
        
        <button type="submit" class="btn" data-original-text="Login" style="width: 100%;">Login</button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid hsl(0, 11%, 2%);">
        <p style="color: hsl(0, 43%, 1%);">Don't have an account?</p>
        <a href="{{ url_for('register') }}" style="color: #667eea; text-decoration: none;">
            Register here →
        </a>
    </div>
    
    <!-- Discrete admin access link -->
    <div style="text-align: center; margin-top: 1rem;">
        <a href="{{ url_for('admin_login') }}" style="color: #121010; text-decoration: none; font-size: 0.8rem;">
            System Administrator Access
        </a>
    </div>
</div>
{% endblock %}
